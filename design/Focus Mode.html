<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Focus · StudySyncer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #f5f0e6;
    --bg-2:         #ede6d5;
    --surface:      #fbf7ec;
    --surface-2:    #ffffff;
    --hover:        #efe9da;

    --ink:          #2a221a;
    --ink-2:        #4a3f30;
    --ink-3:        #8a7c66;
    --ink-faint:    #c4b89e;
    --rule:         rgba(60, 45, 25, 0.12);
    --rule-soft:    rgba(60, 45, 25, 0.06);

    --phys-a:       #ff8d6b;  --phys-b: #ffb8a0;  --phys-ink: #7a2e15;
    --cs-a:         #6db58c;  --cs-b:   #a9d9ba;  --cs-ink:   #1f4a30;
    --eng-a:        #e9b75a;  --eng-b:  #f4d28e;  --eng-ink:  #6a4810;
    --phil-a:       #a98ed4;  --phil-b: #cfbce8;  --phil-ink: #422968;

    /* Active session = CS */
    --acc-a: var(--cs-a);
    --acc-b: var(--cs-b);
    --acc-ink: var(--cs-ink);
    --acc-tint: rgba(109, 181, 140, 0.18);

    --serif: 'Newsreader', 'Iowan Old Style', Georgia, serif;
    --sans:  'Inter', -apple-system, system-ui, sans-serif;
    --mono:  'JetBrains Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100vh;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    background:
      radial-gradient(900px 600px at 50% 30%, var(--acc-tint), transparent 60%),
      radial-gradient(700px 500px at 0% 100%, rgba(169, 142, 212, 0.12), transparent 65%),
      radial-gradient(700px 500px at 100% 0%, rgba(255, 141, 107, 0.08), transparent 60%),
      var(--bg);
  }
  button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; padding: 0; }

  .page {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  /* ── top bar ── */
  .top {
    display: flex; align-items: center;
    padding: 22px 32px;
  }
  .back {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 7px 12px 7px 9px;
    border-radius: 10px;
    color: var(--ink-2);
    font-size: 13px; font-weight: 500;
    transition: background 120ms, color 120ms;
  }
  .back:hover { background: var(--hover); color: var(--ink); }
  .top .center {
    flex: 1;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 600;
  }
  .top .right { display: flex; gap: 4px; }
  .ibtn {
    width: 32px; height: 32px;
    display: grid; place-items: center;
    border-radius: 9px;
    color: var(--ink-3);
    transition: background 120ms, color 120ms;
  }
  .ibtn:hover { background: var(--hover); color: var(--ink); }

  /* ── center stage ── */
  .stage {
    display: grid;
    place-items: center;
    padding: 0 32px;
  }
  .stage-inner {
    display: flex; flex-direction: column; align-items: center;
    width: 100%;
    max-width: 560px;
  }

  /* current task pill above ring */
  .task-card {
    background: var(--surface);
    border: 1px solid var(--rule-soft);
    border-radius: 12px;
    padding: 11px 16px 11px 14px;
    display: inline-flex; align-items: center; gap: 12px;
    margin-bottom: 36px;
    box-shadow: 0 1px 2px rgba(60,45,25,0.04);
  }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 500;
    padding: 3px 9px;
    border-radius: 999px;
    background: var(--acc-tint);
    color: var(--acc-ink);
    flex-shrink: 0;
  }
  .pill .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: linear-gradient(135deg, var(--acc-a), var(--acc-b));
  }
  .task-text {
    font-size: 14px; font-weight: 500; color: var(--ink);
  }
  .task-text em { font-style: italic; color: var(--ink-2); font-weight: 400; }

  /* ── pixel battery ── */
  .batt-wrap {
    position: relative;
    display: flex; flex-direction: column; align-items: center;
    margin-bottom: 18px;
    padding: 22px 28px 18px;
  }
  .batt-wrap::after {
    content: ""; position: absolute;
    inset: -10px;
    background: radial-gradient(ellipse at 50% 50%, var(--acc-tint), transparent 65%);
    z-index: -1;
    border-radius: 50%;
    animation: breathe 4.5s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); opacity: 0.6; }
    50%      { transform: scale(1.06); opacity: 0.9; }
  }

  .batt-tip {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 1.5px;
    width: 56px; height: 14px;
    margin-bottom: 6px;
  }
  .batt-body {
    display: grid;
    grid-template-columns: repeat(22, minmax(0, 1fr));
    grid-template-rows: repeat(32, minmax(0, 1fr));
    gap: 1.5px;
    width: 196px; height: 286px;
    padding: 5px;
    border: 2.5px solid var(--ink-2);
    border-radius: 6px;
    background: var(--surface);
  }
  .batt-tip .cell, .batt-body .cell {
    background: transparent;
    border-radius: 0.5px;
    min-width: 0; min-height: 0;
  }
  .batt-tip .cell { background: var(--ink-2); border-radius: 0.5px; }
  .batt-body .cell.fill {
    background: var(--acc-a);
  }

  .eyebrow {
    font-size: 11px; letter-spacing: 0.16em;
    color: var(--ink-3); font-weight: 600;
    text-transform: uppercase;
    margin-top: 18px;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--acc-ink);
    box-shadow: 0 0 0 0 rgba(31,74,48,0.6);
    animation: blip 1.6s infinite;
  }
  @keyframes blip {
    0%, 100% { box-shadow: 0 0 0 0 rgba(31,74,48,0.55); }
    50%      { box-shadow: 0 0 0 7px rgba(31,74,48,0); }
  }
  .time {
    font-family: var(--serif);
    font-size: 84px;
    font-weight: 500;
    font-style: italic;
    letter-spacing: -0.045em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
    margin-top: 8px;
  }
  .time .colon {
    font-style: normal;
    color: var(--ink-faint);
    margin: 0 -2px;
    animation: tick 1s steps(2) infinite;
  }
  @keyframes tick { 50% { opacity: 0.35; } }
  .phase-label {
    font-family: var(--serif);
    font-size: 17px; font-style: italic;
    color: var(--ink-3);
    margin-top: 6px;
    margin-bottom: 22px;
    font-weight: 400;
  }

  /* ── controls ── */
  .controls {
    display: flex; gap: 10px;
    margin-bottom: 22px;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 11px 22px;
    border-radius: 11px;
    font-size: 13.5px;
    font-weight: 500;
    transition: transform 120ms, background 120ms, filter 120ms;
  }
  .btn:active { transform: translateY(1px); }
  .btn-secondary {
    background: var(--surface);
    color: var(--ink-2);
    border: 1px solid var(--rule-soft);
  }
  .btn-secondary:hover { background: var(--surface-2); color: var(--ink); }
  .btn-primary {
    background: var(--acc-ink);
    color: var(--surface);
    padding: 11px 30px;
    box-shadow: 0 4px 14px -6px rgba(31,74,48,0.4);
  }
  .btn-primary:hover { filter: brightness(1.12); box-shadow: 0 6px 18px -6px rgba(31,74,48,0.5); }
  .btn .ic { width: 13px; height: 13px; }

  /* pomodoro cycle dots */
  .cycle {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 18px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-3);
  }
  .cycle .dots { display: flex; gap: 6px; }
  .cycle .seg {
    width: 26px; height: 5px;
    border-radius: 3px;
    background: var(--rule);
  }
  .cycle .seg.done { background: var(--acc-ink); }
  .cycle .seg.active {
    background: linear-gradient(90deg, var(--acc-ink) 50%, var(--rule) 50%);
  }

  /* ── bottom hint + sidebar peek ── */
  .bottom {
    padding: 20px 32px 28px;
    display: flex; align-items: center; justify-content: space-between;
    color: var(--ink-3);
  }
  .hint { font-size: 12px; }
  .kbd {
    font-family: var(--mono); font-size: 10.5px;
    padding: 2px 7px;
    background: var(--surface);
    border: 1px solid var(--rule);
    border-radius: 4px;
    color: var(--ink-2);
    margin: 0 2px;
  }

  /* up-next chip */
  .up-next {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 8px 14px 8px 12px;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid var(--rule-soft);
    font-size: 12.5px;
    color: var(--ink-2);
  }
  .up-next .label {
    font-size: 10px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-3);
    font-weight: 600;
  }
  .up-next em { font-style: italic; color: var(--ink); }
  .up-next .pill { font-size: 10.5px; padding: 2px 8px; }
  .up-next .pill .dot { width: 6px; height: 6px; }

  /* ambient pill (top right) */
  .amb {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 11px;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid var(--rule-soft);
    font-size: 12px; color: var(--ink-2);
    margin-right: 4px;
  }
  .amb:hover { background: var(--surface-2); color: var(--ink); }
  .amb .ic { width: 12px; height: 12px; opacity: 0.75; }

  /* fullscreen */
  .page.fullscreen-mode {
    position: fixed; inset: 0; z-index: 9999;
    overflow: auto;
    background:
      radial-gradient(1200px 800px at 50% 50%, var(--acc-tint), transparent 65%),
      var(--bg);
    grid-template-rows: 1fr auto;
  }
  .page.fullscreen-mode .top,
  .page.fullscreen-mode .task-card,
  .page.fullscreen-mode .cycle,
  .page.fullscreen-mode .controls,
  .page.fullscreen-mode .up-next { display: none; }
  .page.fullscreen-mode .stage { padding: 0; }
  .page.fullscreen-mode .stage-inner { max-width: none; }
  .page.fullscreen-mode .batt-wrap { cursor: zoom-out; padding: 40px; }
  .page.fullscreen-mode .batt-tip { width: 150px; height: 38px; gap: 4px; margin-bottom: 16px; }
  .page.fullscreen-mode .batt-body { width: 520px; height: 760px; gap: 4px; padding: 14px; border-width: 5px; border-radius: 14px; }
  .page.fullscreen-mode .eyebrow { margin-top: 22px; font-size: 11px; }
  .page.fullscreen-mode .time { font-size: 96px; margin-top: 8px; }
  .page.fullscreen-mode .phase-label { font-size: 16px; margin-bottom: 0; }
  .page.fullscreen-mode .bottom { justify-content: center; padding-bottom: 40px; }

  @media (max-width: 720px) {
    .ring-wrap { width: 280px; height: 280px; }
    .time { font-size: 72px; }
    .top, .bottom { padding-left: 18px; padding-right: 18px; }
    .bottom { flex-direction: column; gap: 12px; align-items: center; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- top bar -->
  <div class="top">
    <a class="back" href="#">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M9.5 3.5 L5 8 L9.5 12.5"/></svg>
      Dashboard
    </a>
    <div class="center">Focus Mode</div>
    <div class="right">
      <button class="amb" title="Ambient sound">
        <svg class="ic" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M2.5 6 L5 6 L8.5 3 L8.5 13 L5 10 L2.5 10 Z"/>
          <path d="M11 5.5 Q12.5 8 11 10.5"/>
          <path d="M13 4 Q15 8 13 12"/>
        </svg>
        Rain · low
      </button>
      <button class="ibtn" title="Settings">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="8" cy="8" r="2.4"/>
          <path d="M8 1.5v2M8 12.5v2M14.5 8h-2M3.5 8h-2M12.6 3.4l-1.4 1.4M4.8 11.2l-1.4 1.4M12.6 12.6l-1.4-1.4M4.8 4.8L3.4 3.4"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- stage -->
  <div class="stage">
    <div class="stage-inner">

      <div class="task-card">
        <span class="pill"><span class="dot"></span>CS 232</span>
        <span class="task-text">Problem set 3 — <em>induction proofs</em></span>
      </div>

      <div class="batt-wrap" id="battWrap" title="Click for full screen">
        <div class="batt-tip" id="battTip"></div>
        <div class="batt-body" id="battBody"></div>
      </div>
      <div class="eyebrow"><span class="live-dot"></span>In session</div>
      <div class="time">14<span class="colon">:</span>32</div>
      <div class="phase-label">deep work · pomodoro 2 of 4</div>

      <script>
        (function(){
          var tip = document.getElementById('battTip');
          for (var i = 0; i < 16; i++) {
            var c = document.createElement('div'); c.className = 'cell'; tip.appendChild(c);
          }
          var body = document.getElementById('battBody');
          var COLS = 22, ROWS = 32;
          var TOTAL = COLS * ROWS;
          var PROG = 0.58; // 14:32 of 25:00 elapsed → ~58% remaining
          var fillRows = Math.round(ROWS * PROG);
          var fillThreshold = ROWS - fillRows; // rows from top that stay empty
          for (var r = 0; r < ROWS; r++) {
            for (var col = 0; col < COLS; col++) {
              var cell = document.createElement('div');
              cell.className = 'cell';
              if (r >= fillThreshold) {
                cell.classList.add('fill');
              }
              body.appendChild(cell);
            }
          }
        })();
      </script>

      <script>
        (function(){
          var page = document.querySelector('.page');
          var wrap = document.getElementById('battWrap');
          wrap.addEventListener('click', function(){
            page.classList.toggle('fullscreen-mode');
          });
          document.addEventListener('keydown', function(e){
            if (e.key === 'Escape') page.classList.remove('fullscreen-mode');
          });
        })();
      </script>

      <div class="cycle">
        <span>Cycle</span>
        <div class="dots">
          <div class="seg done"></div>
          <div class="seg active"></div>
          <div class="seg"></div>
          <div class="seg"></div>
        </div>
        <span>2 / 4</span>
      </div>

      <div class="controls">
        <button class="btn btn-secondary">
          <svg class="ic" viewBox="0 0 16 16" fill="currentColor"><path d="M3.5 3 L9 8 L3.5 13 Z"/><rect x="10.5" y="3" width="2" height="10" rx="0.5"/></svg>
          Skip
        </button>
        <button class="btn btn-primary">
          <svg class="ic" viewBox="0 0 16 16" fill="currentColor"><rect x="4" y="3.5" width="2.5" height="9" rx="0.5"/><rect x="9.5" y="3.5" width="2.5" height="9" rx="0.5"/></svg>
          Pause
        </button>
      </div>

    </div>
  </div>

  <!-- bottom -->
  <div class="bottom">
    <div class="up-next">
      <span class="label">Up next</span>
      <em>Read Ch. 4 — Equilibrium</em>
      <span class="pill" style="background: rgba(255,141,107,0.16); color: var(--phys-ink);">
        <span class="dot" style="background: linear-gradient(135deg, var(--phys-a), var(--phys-b));"></span>
        PHYS 211
      </span>
    </div>
    <div class="hint">
      <span class="kbd">Space</span> pause/resume · <span class="kbd">S</span> skip · <span class="kbd">Esc</span> exit
    </div>
  </div>

</div>

</body>
</html>
