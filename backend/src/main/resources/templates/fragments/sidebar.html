<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside class="sidebar" th:fragment="sidebar">

    <div class="ws">
        <div class="ws-icon" th:text="${sidebarUser != null ? sidebarUser.avatarInitial : 'S'}">S</div>
        <div class="ws-name"
             th:text="${sidebarUser != null ? sidebarUser.firstName + ' ' + sidebarUser.lastName : 'StudySyncer'}">
            StudySyncer
        </div>
        <span class="ws-chev" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
        </span>
    </div>

    <button class="cmd" type="button" aria-label="Open command menu">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <span>Search…</span>
        <span class="cmd-kbd">⌘K</span>
    </button>

    <nav class="pinned" aria-label="Primary">
        <a class="pin" th:classappend="${currentNav == 'today'} ? ' active' : ''" th:href="@{/}">
            <svg class="pin-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="9"></circle>
                <polyline points="12 7 12 12 15 14"></polyline>
            </svg>
            <span class="nav-label">Today</span>
        </a>
        <a class="pin" th:classappend="${currentNav == 'tasks'} ? ' active' : ''" th:href="@{/tasks}">
            <svg class="pin-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            <span class="nav-label">Tasks</span>
        </a>
        <a class="pin" th:classappend="${currentNav == 'exams'} ? ' active' : ''" th:href="@{/exams}">
            <svg class="pin-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <rect x="4" y="4" width="16" height="16" rx="2"></rect>
                <line x1="9" y1="9" x2="15" y2="9"></line>
                <line x1="9" y1="13" x2="15" y2="13"></line>
                <line x1="9" y1="17" x2="13" y2="17"></line>
            </svg>
            <span class="nav-label">Exams</span>
        </a>
        <a class="pin" th:classappend="${currentNav == 'tracker'} ? ' active' : ''" th:href="@{/tracker}">
            <svg class="pin-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polyline points="3 17 9 11 13 15 21 7"></polyline>
                <polyline points="14 7 21 7 21 14"></polyline>
            </svg>
            <span class="nav-label">Tracker</span>
        </a>
        <a class="pin" th:classappend="${currentNav == 'focus'} ? ' active' : ''" th:href="@{/focus}">
            <svg class="pin-ico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="9"></circle>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <span class="nav-label">Focus</span>
        </a>
    </nav>

    <section class="spaces" th:if="${sidebarCourses != null and !sidebarCourses.isEmpty()}">
        <div class="section-label">Spaces</div>
        <ul class="space-list">
            <li class="space" th:each="course : ${sidebarCourses}">
                <span class="space-pebble"
                      th:classappend="' ' + (
                        ${course.colorKey.name() == 'PHYSICS' and course.colorVariant.name() == 'DEEP'} ? 'pebble-phys2' :
                        ${course.colorKey.name() == 'PHYSICS'} ? 'pebble-phys' :
                        ${course.colorKey.name() == 'CS'} ? 'pebble-cs' :
                        ${course.colorKey.name() == 'ENG'} ? 'pebble-eng' :
                        ${course.colorKey.name() == 'PHIL'} ? 'pebble-phil' :
                        'pebble-other'
                      )"></span>
                <span class="space-code" th:text="${course.code}">PHYS 211</span>
            </li>
        </ul>
    </section>

    <section class="tags" th:if="${sidebarTags != null and !sidebarTags.isEmpty()}">
        <div class="section-label">Tags</div>
        <ul class="tag-list">
            <li class="tag" th:each="tag : ${sidebarTags}">
                <span class="tag-hash">#</span><span th:text="${tag.name}">tag</span>
            </li>
        </ul>
    </section>

    <div class="sidebar-foot">
        <div class="avatar" th:text="${sidebarUser != null ? sidebarUser.avatarInitial : '?'}">?</div>
        <div class="foot-name"
             th:text="${sidebarUser != null ? sidebarUser.firstName + ' ' + sidebarUser.lastName : ''}">
        </div>
        <form th:action="@{/logout}" method="post" class="foot-logout">
            <button type="submit" class="foot-gear" aria-label="Log out" title="Log out">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </button>
        </form>
    </div>
</aside>
</body>
</html>
